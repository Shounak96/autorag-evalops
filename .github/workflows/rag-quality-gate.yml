name: AutoRAG Quality Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: autorag-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-validation:
    name: Backend validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: sqlite+pysqlite:///:memory:
      CI_GATE_TOKEN: test-ci-gate-token
      GEMINI_API_KEY: test-api-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -v

  frontend-validation:
    name: Frontend validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  rag-quality-gate:
    name: RAG regression quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-validation
      - frontend-validation

    env:
      AUTORAG_API_BASE_URL: ${{ vars.AUTORAG_API_BASE_URL }}
      AUTORAG_DATASET_ID: ${{ vars.AUTORAG_DATASET_ID }}
      AUTORAG_PROMPT_VERSION_ID: ${{ vars.AUTORAG_PROMPT_VERSION_ID }}
      AUTORAG_CI_GATE_TOKEN: ${{ secrets.AUTORAG_CI_GATE_TOKEN }}

      AUTORAG_TOP_K: "5"
      AUTORAG_VECTOR_WEIGHT: "0.7"
      AUTORAG_KEYWORD_WEIGHT: "0.3"
      AUTORAG_USE_QUERY_REWRITE: "false"
      AUTORAG_MAX_REWRITTEN_QUERIES: "4"

      AUTORAG_MIN_PASS_RATE: "0.8"
      AUTORAG_MIN_RETRIEVAL_SCORE: "0.2"
      AUTORAG_MIN_GROUNDING_SCORE: "0.75"
      AUTORAG_MIN_CITATION_COVERAGE: "1.0"
      AUTORAG_MIN_ANSWER_SCORE: "0.6"
      AUTORAG_MAX_UNSUPPORTED_CLAIMS: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Run AutoRAG regression gate
        run: python scripts/run_ci_quality_gate.py

      - name: Upload quality-gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: autorag-quality-gate-report
          path: artifacts/ci-quality-gate-report.json
          if-no-files-found: warn
          retention-days: 14